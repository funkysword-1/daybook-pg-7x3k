<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daybook">
<meta name="theme-color" content="#F7F4EC">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Daybook</title>
<style>
  :root{
    --cream:#F0ECE0; --card:#F8F5EC; --tint:#E8E4D6; --tint2:#E2E7D8;
    --ink:#2E3A2F; --ink2:#40513F; --mut:#79856F; --faint:#9B9E8C;
    --sage:#5F7A61; --sage-lt:#A2B199; --line:#D5CFBF; --line2:#C2CBB7;
    --warn:#A86832; --scrim:rgba(46,58,47,.28);
    --serif: ui-serif, "New York", Georgia, serif;
    --sans: -apple-system, "SF Pro Text", "Segoe UI", sans-serif;
  }
  html[data-theme="dark"]{
    --cream:#1D201B; --card:#272B24; --tint:#252922; --tint2:#2A2E25;
    --ink:#E3E1D4; --ink2:#C6CBB8; --mut:#8C9583; --faint:#666D5E;
    --sage:#8CA88C; --sage-lt:#57654F; --line:#363B32; --line2:#414738;
    --warn:#D09A62; --scrim:rgba(0,0,0,.5);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--cream); color:var(--ink);
    font-family:var(--sans); font-size:16px; height:100%;}
  body{padding: env(safe-area-inset-top) 0 0 0;}
  h1,h2{font-family:var(--serif); font-weight:500; margin:0;}
  h1{font-size:24px;} h2{font-size:18px;}
  button{font-family:var(--sans); border:none; background:none; color:inherit;
    font-size:15px; padding:0; cursor:pointer;}
  input,select{font-family:var(--sans); font-size:16px; color:var(--ink);}
  .app{max-width:560px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}
  header.top{padding:18px 20px 6px; display:flex; align-items:baseline; justify-content:space-between;}
  .streak-chip{font-size:13px; color:var(--mut);}
  main{flex:1; overflow-y:auto; padding:6px 20px 190px;}
  .muted{color:var(--mut); font-size:13px;}
  .eyebrow{font-size:12px; letter-spacing:.06em; color:var(--mut); margin:18px 0 8px; text-transform:uppercase;}
  .card{background:var(--card); border:0.5px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:8px;}
  .row{display:flex; align-items:center; gap:10px;}
  .tint-card{background:var(--tint); border-radius:12px; padding:11px 14px; margin-bottom:8px;}
  .checkbox{width:20px;height:20px;border:1.5px solid var(--sage-lt);border-radius:6px;flex-shrink:0;background:none;}
  .checkbox.done{background:var(--sage);border-color:var(--sage);}
  .task-when{margin-left:auto; font-size:12px; color:var(--warn); flex-shrink:0;}
  .task-when.loose{color:var(--mut);}
  .sub-line{font-size:12px; color:var(--mut); margin-top:3px;}
  .icon-btn{color:var(--mut); font-size:18px; padding:4px; flex-shrink:0;}
  .empty{color:var(--faint); font-size:14px; padding:14px 4px; text-align:center;}
  .dock{position:fixed; bottom:0; left:0; right:0; background:var(--cream);
    border-top:0.5px solid var(--line); padding:10px 16px calc(10px + env(safe-area-inset-bottom));}
  .dock-inner{max-width:560px; margin:0 auto;}
  .capture{display:flex; align-items:center; gap:10px; background:var(--card);
    border:0.5px solid var(--line); border-radius:999px; padding:6px 8px 6px 16px;}
  .capture input{flex:1; border:none; outline:none; background:none; min-width:0;}
  .capture input::placeholder{color:var(--faint);}
  .mic,.send{width:38px;height:38px;border-radius:999px;display:flex;align-items:center;
    justify-content:center;font-size:18px;flex-shrink:0;}
  .mic{color:var(--sage); background:var(--tint2);}
  .mic.listening{background:var(--sage); color:var(--cream); animation:pulse 1.2s infinite;}
  @keyframes pulse{50%{opacity:.6;}}
  .send{background:var(--sage); color:var(--cream);}
  .confirm{background:var(--tint2); border-radius:14px; padding:12px 14px; margin-bottom:10px;}
  .confirm .guess-text{font-size:14px; color:var(--ink2); margin-bottom:10px; font-style:italic;}
  .pills{display:flex; gap:6px; flex-wrap:wrap; align-items:center;}
  .pill{font-size:13px; border-radius:999px; padding:6px 12px; border:0.5px solid var(--line2); background:var(--card); color:var(--ink2);}
  .pill.on{background:var(--sage); color:var(--cream); border-color:var(--sage);}
  .confirm select{border:0.5px solid var(--line2); background:var(--card); border-radius:999px;
    padding:6px 10px; font-size:13px; color:var(--ink2); -webkit-appearance:none; appearance:none; max-width:46%;}
  .confirm-actions{display:flex; gap:8px; margin-top:10px;}
  .when-row{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; align-items:center;}
  .when-row input,.when-row select,.sheet input.field,.sheet select{border:0.5px solid var(--line2);
    background:var(--card); border-radius:10px; padding:7px 10px; font-size:14px; color:var(--ink2); outline:none;}
  .btn{flex:1; text-align:center; padding:10px; border-radius:10px; font-size:15px;}
  .btn.primary{background:var(--sage); color:var(--cream);}
  .btn.quiet{background:var(--card); border:0.5px solid var(--line2); color:var(--mut);}
  .nav{display:flex; justify-content:space-around; padding-top:8px;}
  .nav button{display:flex; flex-direction:column; align-items:center; gap:2px;
    font-size:11px; color:var(--faint); padding:4px 14px;}
  .nav button.on{color:var(--sage);}
  .nav button i{font-size:20px;}
  .sec-head{display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:12px 14px;}
  .sec-head .name{font-weight:500; font-size:15px;}
  .sec-head .meta{margin-left:auto; font-size:12px; color:var(--mut);}
  .sec-card{background:var(--card); border:0.5px solid var(--line); border-radius:12px; margin-bottom:8px; overflow:hidden;}
  .sub-row{display:flex; align-items:center; width:100%; text-align:left; font-size:14px;
    padding:9px 14px 9px 26px; border-top:0.5px solid var(--line); color:var(--ink2);}
  .sub-row .meta{margin-left:auto; font-size:12px; color:var(--mut);}
  .ghost-row{display:flex; align-items:center; gap:8px; color:var(--mut); font-size:13px; padding:10px 4px;}
  .stats{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px;}
  .stat{background:var(--tint); border-radius:12px; padding:12px 14px;}
  .stat .v{font-size:22px; font-weight:500; margin-top:2px;}
  .bars{display:flex; align-items:flex-end; gap:6px; height:64px; margin:6px 0 4px;}
  .bars div{flex:1; background:var(--sage-lt); border-radius:4px 4px 0 0; min-height:3px;}
  .bars div.today{background:var(--sage);}
  .search{display:flex; align-items:center; gap:8px; background:var(--card); border:0.5px solid var(--line);
    border-radius:999px; padding:9px 14px; margin:14px 0 10px;}
  .search input{flex:1; border:none; outline:none; background:none;}
  .overlay{position:fixed; inset:0; background:var(--cream); z-index:50; display:flex;
    flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:24px;}
  .overlay input{border:0.5px solid var(--line); border-radius:12px; padding:12px 16px;
    font-size:22px; text-align:center; letter-spacing:8px; width:180px; background:var(--card); outline:none;}
  .sheet-bg{position:fixed; inset:0; background:var(--scrim); z-index:40;}
  .sheet{position:fixed; left:0; right:0; bottom:0; z-index:41; background:var(--cream);
    border-radius:18px 18px 0 0; padding:20px 20px calc(24px + env(safe-area-inset-bottom));
    max-width:560px; margin:0 auto;}
  .sheet .opt{display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    padding:13px 4px; border-bottom:0.5px solid var(--line); font-size:15px; color:var(--ink2);}
  .sheet .opt i{font-size:18px; color:var(--sage);}
  .hidden{display:none !important;}
  del{color:var(--faint);}
  /* motion */
  button{transition:transform .16s cubic-bezier(.34,1.56,.64,1), background-color .2s ease, color .2s ease;}
  button:active{transform:scale(.93);}
  .sec-head:active,.sub-row:active,.opt:active,.btn:active{transform:scale(.985);}
  #confirmBox .confirm{animation:rise .3s cubic-bezier(.3,1.4,.6,1);}
  @keyframes rise{from{opacity:0; transform:translateY(16px) scale(.97);} to{opacity:1; transform:none;}}
  .sheet{animation:rise .32s cubic-bezier(.25,1.2,.4,1);}
  .sheet-bg{animation:fade .22s ease;}
  @keyframes fade{from{opacity:0;} to{opacity:1;}}
  main.swap{animation:viewfade .26s ease;}
  @keyframes viewfade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
  .bars div{transform-origin:bottom; animation:grow .55s cubic-bezier(.22,1,.36,1);}
  @keyframes grow{from{transform:scaleY(0);} to{transform:scaleY(1);}}
  .checkbox{transition:background-color .2s ease, border-color .2s ease;}
  .checkbox.pop{animation:pop .32s cubic-bezier(.34,1.56,.64,1);}
  @keyframes pop{0%{transform:scale(1);} 55%{transform:scale(1.35);} 100%{transform:scale(1);}}
  .nav button{transition:color .2s ease, transform .22s cubic-bezier(.34,1.56,.64,1);}
  .nav button.on{transform:translateY(-2px);}
  .mic.listening{animation:pulse 1.2s infinite;}
  @media (prefers-reduced-motion: reduce){*{animation:none !important; transition:none !important;}}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
</head>
<body>
<div id="lock" class="overlay hidden">
  <h1 style="font-size:28px;">Daybook</h1>
  <p class="muted">Enter your passcode</p>
  <input id="lockInput" type="password" inputmode="numeric" maxlength="4" autocomplete="off">
  <p id="lockErr" class="muted" style="color:var(--warn); visibility:hidden;">Wrong passcode</p>
</div>

<div class="app">
  <header class="top">
    <div>
      <h1 id="pageTitle">Today</h1>
      <p id="pageSub" class="muted" style="margin:2px 0 0;"></p>
    </div>
    <div class="row" style="gap:14px;">
      <span id="streakChip" class="streak-chip"></span>
      <button class="icon-btn" aria-label="Settings" onclick="openSettings()"><i class="ti ti-settings"></i></button>
    </div>
  </header>
  <main id="main"></main>
</div>

<div class="dock">
  <div class="dock-inner">
    <div id="confirmBox" class="hidden"></div>
    <div class="capture">
      <input id="captureInput" placeholder="Speak or type anything…" autocomplete="off"
        onkeydown="if(event.key==='Enter')submitCapture()">
      <button id="micBtn" class="mic" aria-label="Voice input" onclick="toggleMic()"><i class="ti ti-microphone"></i></button>
      <button class="send" aria-label="Add" onclick="submitCapture()"><i class="ti ti-arrow-up"></i></button>
    </div>
    <nav class="nav">
      <button id="nav-today" class="on" onclick="go('today')"><i class="ti ti-sun"></i>Today</button>
      <button id="nav-sections" onclick="go('sections')"><i class="ti ti-category"></i>Sections</button>
      <button id="nav-review" onclick="go('review')"><i class="ti ti-chart-bar"></i>Review</button>
    </nav>
  </div>
</div>

<div id="sheetWrap" class="hidden">
  <div class="sheet-bg" onclick="closeSheet()"></div>
  <div class="sheet" id="sheetBody"></div>
</div>

<script>
"use strict";
/* ---------- store ---------- */
const KEY="daybook.v1";
const DEFAULTS={
  entries:[],
  settings:{pinHash:null,theme:"auto"},
  learned:{},
  sections:[
    {id:"finance",name:"Finance",icon:"ti-coin",subs:[
      {id:"investing",name:"Investing",kw:["invest","invested","investing","stock","stocks","etf","index fund","mutual fund","sip","crypto","bitcoin","shares","portfolio","dividend","brokerage","401k","roth"]},
      {id:"bills",name:"Bills & utilities",kw:["bill","bills","electricity","electric","internet","wifi","rent","utility","utilities","subscription","recharge","insurance","tuition","phone bill","water bill","emi"]},
      {id:"spending",name:"Spending",kw:["spent","bought","purchase","purchased","ordered","groceries","shopping","paid for","amazon"]},
      {id:"income",name:"Income",kw:["salary","paycheck","stipend","refund","deposit","earned","got paid","cashback"]}]},
    {id:"health",name:"Health",icon:"ti-heart",subs:[
      {id:"exercise",name:"Exercise",kw:["run","ran","running","gym","workout","worked out","lift","lifted","walk","walked","yoga","swim","swam","cycling","cardio","exercise","miles","steps"]},
      {id:"food",name:"Food",kw:["ate","eating","meal","lunch","dinner","breakfast","protein","diet","snack","cooked","calories","fasting"]},
      {id:"sleep",name:"Sleep",kw:["sleep","slept","nap","woke","insomnia","bedtime"]},
      {id:"medical",name:"Medical",kw:["doctor","dentist","medicine","meds","pharmacy","appointment","sick","fever","headache","vitamins","prescription"]}]},
    {id:"tech",name:"Tech",icon:"ti-device-laptop",subs:[
      {id:"laptop",name:"Laptop",kw:["laptop","computer","pc","mac","macbook","keyboard","monitor","backup","back up"]},
      {id:"phone",name:"Phone",kw:["phone","iphone","android","sim","screen protector"]},
      {id:"gear",name:"Other gear",kw:["charger","headphones","earbuds","airpods","cable","mouse","router","software","update"]}]},
    {id:"school",name:"School",icon:"ti-book",subs:[
      {id:"classes",name:"Classes",kw:["class","lecture","course","professor","semester","registration","office hours"]},
      {id:"assignments",name:"Assignments",kw:["assignment","homework","project","submit","essay","lab report","deadline","due"]},
      {id:"exams",name:"Exams",kw:["exam","quiz","test","midterm","final","study","studied","revise","gpa","grade"]}]},
    {id:"home",name:"Home & errands",icon:"ti-home",subs:[
      {id:"chores",name:"Chores",kw:["laundry","clean","cleaned","cleaning","dishes","vacuum","trash","cook","tidy"]},
      {id:"errands",name:"Errands",kw:["errand","pick up","drop off","post office","bank","dmv","haircut","car wash","gas","oil change","return"]}]},
    {id:"people",name:"People",icon:"ti-users",subs:[
      {id:"family",name:"Family",kw:["mom","dad","family","brother","sister","grandma","grandpa","call home","amma","appa"]},
      {id:"friends",name:"Friends",kw:["friend","friends","hang out","hangout","meet up","birthday","party","roommate"]}]},
    {id:"notes",name:"Notes",icon:"ti-note",subs:[
      {id:"ideas",name:"Ideas",kw:["idea","thought","maybe","someday","what if"]},
      {id:"journal",name:"Journal",kw:["felt","feeling","grateful","mood","today was","tired","happy","stressed"]}]}
  ]
};
let db=load();
function load(){
  try{const raw=localStorage.getItem(KEY); if(raw){const d=JSON.parse(raw);
    for(const k of Object.keys(DEFAULTS)) if(!(k in d)) d[k]=structuredClone(DEFAULTS[k]);
    return d;}}catch(e){}
  return structuredClone(DEFAULTS);
}
function save(){localStorage.setItem(KEY,JSON.stringify(db));}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc=s=>s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* ---------- date helpers ---------- */
const dayKey=ts=>{const d=new Date(ts);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
const todayKey=()=>dayKey(Date.now());
function fmtTime(ts){return new Date(ts).toLocaleTimeString([], {hour:"numeric",minute:"2-digit"});}
function fmtDay(ts){return new Date(ts).toLocaleDateString([], {month:"short",day:"numeric"});}
function dtLocal(ts){const d=new Date(ts);const p=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"T"+p(d.getHours())+":"+p(d.getMinutes());}
function repeatOpts(cur){return ["","daily","weekly","monthly"].map(v=>`<option value="${v}" ${(cur||"")===v?"selected":""}>${v||"no repeat"}</option>`).join("");}
function dueLabel(e){
  if(!e.due) return "whenever";
  const d=new Date(e.due), now=new Date();
  if(dayKey(e.due)===todayKey()) return d.getHours()>=18?"tonight":"today "+fmtTime(e.due);
  if(e.due<now.getTime()) return "overdue · "+fmtDay(e.due);
  const tom=new Date(now); tom.setDate(tom.getDate()+1);
  if(dayKey(e.due)===dayKey(tom.getTime())) return "tomorrow "+fmtTime(e.due);
  return fmtDay(e.due)+" "+fmtTime(e.due);
}

/* ---------- parser ---------- */
const TASK_HINTS=["need to","needa","gotta","have to","has to","should ","remind","remember to","don't forget","dont forget","todo","to do","pay ","call ","email ","text ","buy ","submit","finish","schedule","book ","renew","apply","register","sign up","fix ","return ","pick up","drop off","back up","study for","start "];
const TIME_HINTS=["tonight","tomorrow","later","in an hour","in a few","next week","by ","at ","every ","this evening","this afternoon","morning","whenever","soon"];
const LOG_HINTS=["spent","bought","paid","ate","ran","went","did ","finished","watched","slept","woke","moved","invested","felt","was ","got ","made ","completed","worked out","just "];
function parseTime(t){
  const now=new Date(); let d=null;
  const set=(dt,h,m)=>{dt.setHours(h,m||0,0,0); return dt;};
  let m;
  if(/\btonight\b/.test(t)) d=set(new Date(),20);
  else if(/\bthis evening\b/.test(t)) d=set(new Date(),18);
  else if(/\bthis afternoon\b/.test(t)) d=set(new Date(),15);
  else if((m=t.match(/\bin (\d+|an?|a few) (hour|hr|minute|min)s?\b/))){
    let n=(m[1]==="a"||m[1]==="an")?1:(m[1]==="a few"?3:parseInt(m[1]));
    d=new Date(now.getTime()+n*(m[2].startsWith("h")?36e5:6e4));
  }
  else if(/\btomorrow\b/.test(t)){d=new Date(now); d.setDate(d.getDate()+1); set(d,9);
    const tm=t.match(/tomorrow (?:morning|at )?\s?(\d{1,2})(?::(\d{2}))?\s?(am|pm)?/);
    if(tm&&tm[1]) applyClock(d,tm);}
  else if((m=t.match(/\bat (\d{1,2})(?::(\d{2}))?\s?(am|pm)?\b/))){d=new Date(now); applyClock(d,m);
    if(d.getTime()<now.getTime()) d.setDate(d.getDate()+1);}
  else if(/\bnext week\b/.test(t)){d=new Date(now); d.setDate(d.getDate()+7); set(d,9);}
  let repeat=null;
  if(/\bevery (day|morning|night|evening)\b|\bdaily\b/.test(t)) repeat="daily";
  else if(/\bevery week\b|\bweekly\b/.test(t)) repeat="weekly";
  else if(/\bevery month\b|\bmonthly\b/.test(t)) repeat="monthly";
  return {due:d?d.getTime():null, repeat};
  function applyClock(dt,mm){let h=parseInt(mm[1]); const min=mm[2]?parseInt(mm[2]):0;
    if(mm[3]==="pm"&&h<12)h+=12; if(mm[3]==="am"&&h===12)h=0;
    if(!mm[3]&&h<8)h+=12; dt.setHours(h,min,0,0);}
}
function parseAmount(t){
  const m=t.match(/\$\s?(\d[\d,]*(?:\.\d{1,2})?)/)||t.match(/(\d[\d,]*(?:\.\d{1,2})?)\s?(?:dollars|bucks|usd)\b/i);
  return m?parseFloat(m[1].replace(/,/g,"")):null;
}
function classify(text){
  const t=" "+text.toLowerCase()+" ";
  const {due,repeat}=parseTime(t);
  let taskScore=0, logScore=0;
  for(const h of TASK_HINTS) if(t.includes(h)) taskScore+=2;
  for(const h of LOG_HINTS) if(t.includes(h)) logScore+=2;
  if(due||repeat) taskScore+=2;
  for(const h of TIME_HINTS) if(t.includes(h)) taskScore+=1;
  const type=taskScore>logScore?"task":"log";
  let best={sec:null,sub:null,score:0};
  for(const s of db.sections) for(const sub of s.subs){
    let sc=0;
    for(const kw of sub.kw||[]) if(t.includes(kw)) sc+=kw.length>4?2:1;
    const lk=db.learned[s.id+"/"+sub.id]||[];
    for(const kw of lk) if(t.includes(kw)) sc+=3;
    if(sc>best.score) best={sec:s.id,sub:sub.id,score:sc};
  }
  if(!best.sec){best.sec="notes"; best.sub=type==="task"?"ideas":"journal";}
  return {type, sec:best.sec, sub:best.sub, due, repeat, amount:parseAmount(text)};
}
function learn(entry){
  const key=entry.sec+"/"+entry.sub;
  const stop=["that","this","with","have","need","will","just","from","about","some","been","they","them","when","what","then","later","tonight","tomorrow","every"];
  const words=entry.text.toLowerCase().replace(/[^a-z\s]/g," ").split(/\s+/)
    .filter(w=>w.length>3&&!stop.includes(w));
  db.learned[key]=[...new Set([...(db.learned[key]||[]),...words])].slice(-40);
}

/* ---------- capture flow ---------- */
let pending=null;
function submitCapture(){
  const inp=document.getElementById("captureInput");
  const text=inp.value.trim(); if(!text) return;
  const g=classify(text);
  pending={id:uid(), text, ...g, ts:Date.now(), done:false};
  inp.value=""; inp.blur();
  renderConfirm();
}
function renderConfirm(){
  const box=document.getElementById("confirmBox");
  if(!pending){box.classList.add("hidden"); box.innerHTML=""; return;}
  const secOpts=db.sections.map(s=>`<option value="${s.id}" ${s.id===pending.sec?"selected":""}>${esc(s.name)}</option>`).join("");
  const sec=db.sections.find(s=>s.id===pending.sec);
  const subOpts=sec.subs.map(x=>`<option value="${x.id}" ${x.id===pending.sub?"selected":""}>${esc(x.name)}</option>`).join("")
    +`<option value="__new">+ New subsection…</option>`;
  box.innerHTML=`
    <div class="confirm">
      <div class="guess-text">“${esc(pending.text)}”</div>
      <div class="pills">
        <button class="pill ${pending.type==='task'?'on':''}" onclick="setType('task')">Task</button>
        <button class="pill ${pending.type==='log'?'on':''}" onclick="setType('log')">Log</button>
        <select onchange="setSec(this.value)">${secOpts}</select>
        <select onchange="setSub(this.value)">${subOpts}</select>
        ${pending.type==='task'?`<button class="pill" style="border-style:dashed;" onclick="pending._w=!pending._w;renderConfirm()"><i class="ti ti-clock" style="font-size:12px;"></i> ${dueLabel(pending)}${pending.repeat?" · repeats":""}</button>`:""}
        ${pending.amount!=null?`<span class="pill">$${pending.amount.toLocaleString()}</span>`:""}
      </div>
      ${pending.type==='task'&&pending._w?`<div class="when-row">
        <input type="datetime-local" value="${pending.due?dtLocal(pending.due):""}" onchange="pending.due=this.value?new Date(this.value).getTime():null;renderConfirm()">
        <select onchange="pending.repeat=this.value||null;renderConfirm()">${repeatOpts(pending.repeat)}</select>
        <button class="pill" onclick="pending.due=null;pending.repeat=null;renderConfirm()">no time</button>
      </div>`:""}
      <div class="confirm-actions">
        <button class="btn quiet" onclick="cancelPending()">Discard</button>
        <button class="btn primary" onclick="savePending()">Save</button>
      </div>
    </div>`;
  box.classList.remove("hidden");
}
function setType(t){pending.type=t; renderConfirm();}
function setSec(id){pending.sec=id; pending.sub=db.sections.find(s=>s.id===id).subs[0].id; renderConfirm();}
function setSub(id){
  if(id==="__new"){const name=prompt("Name the new subsection:"); if(name){
    const sec=db.sections.find(s=>s.id===pending.sec);
    const nid=uid(); sec.subs.push({id:nid,name:name.trim(),kw:[]}); pending.sub=nid; save();}
    renderConfirm(); return;}
  pending.sub=id; renderConfirm();
}
function cancelPending(){pending=null; renderConfirm();}
function savePending(){
  delete pending._w;
  learn(pending);
  db.entries.push(pending);
  const saved=pending; pending=null;
  save(); renderConfirm(); render();
  if(saved.type==="task"&&saved.due&&confirm("Add a reminder to your iPhone Calendar?")) downloadICS(saved);
}

/* ---------- calendar handoff ---------- */
function icsFor(id){const e=db.entries.find(x=>x.id===id); if(e) downloadICS(e);}
function downloadICS(e){
  const dt=new Date(e.due);
  const p=n=>String(n).padStart(2,"0");
  const stamp=d=>d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+"T"+p(d.getHours())+p(d.getMinutes())+"00";
  const end=new Date(dt.getTime()+30*6e4);
  const rr=e.repeat==="daily"?"RRULE:FREQ=DAILY\r\n":e.repeat==="weekly"?"RRULE:FREQ=WEEKLY\r\n":e.repeat==="monthly"?"RRULE:FREQ=MONTHLY\r\n":"";
  const txt=e.text.replace(/[\\;,]/g," ");
  const ics="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Daybook//EN\r\nBEGIN:VEVENT\r\nUID:"+e.id+"@daybook\r\nDTSTART:"+stamp(dt)+"\r\nDTEND:"+stamp(end)+"\r\nSUMMARY:"+txt+"\r\n"+rr+"BEGIN:VALARM\r\nTRIGGER:-PT0M\r\nACTION:DISPLAY\r\nDESCRIPTION:"+txt+"\r\nEND:VALARM\r\nEND:VEVENT\r\nEND:VCALENDAR\r\n";
  const a=document.createElement("a");
  a.href="data:text/calendar;charset=utf-8,"+encodeURIComponent(ics);
  a.download="reminder.ics"; document.body.appendChild(a); a.click(); a.remove();
}

/* ---------- voice ---------- */
let rec=null, listening=false;
function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("Voice isn't available in this browser — use the mic key on your keyboard instead."); return;}
  if(listening){rec.stop(); return;}
  rec=new SR(); rec.lang="en-US"; rec.interimResults=false; rec.maxAlternatives=1;
  const btn=document.getElementById("micBtn");
  rec.onstart=()=>{listening=true; btn.classList.add("listening");};
  rec.onend=()=>{listening=false; btn.classList.remove("listening");};
  rec.onerror=()=>{listening=false; btn.classList.remove("listening");};
  rec.onresult=ev=>{
    document.getElementById("captureInput").value=ev.results[0][0].transcript;
    submitCapture();
  };
  rec.start();
}

/* ---------- entry actions ---------- */
function toggleDone(id,el){
  const e=db.entries.find(x=>x.id===id); if(!e) return;
  if(el&&!e.done){el.classList.add("done","pop"); setTimeout(()=>finishToggle(id),280); return;}
  finishToggle(id);
}
function finishToggle(id){
  const e=db.entries.find(x=>x.id===id); if(!e) return;
  e.done=!e.done; e.doneTs=e.done?Date.now():null;
  if(e.done&&e.repeat){
    const next=structuredClone(e); next.id=uid(); next.done=false; next.doneTs=null; next.ts=Date.now();
    const d=new Date(e.due||Date.now());
    if(e.repeat==="daily")d.setDate(d.getDate()+1);
    if(e.repeat==="weekly")d.setDate(d.getDate()+7);
    if(e.repeat==="monthly")d.setMonth(d.getMonth()+1);
    next.due=d.getTime(); db.entries.push(next);
  }
  save(); render();
}
function delEntry(id,el){
  if(!confirm("Delete this entry?")) return;
  const row=el?el.closest(".card,.tint-card"):null;
  const fin=()=>{db.entries=db.entries.filter(x=>x.id!==id); save(); render();};
  if(row){row.style.transition="opacity .18s ease, transform .18s ease";
    row.style.opacity="0"; row.style.transform="scale(.96)"; setTimeout(fin,180);}
  else fin();
}
function pathOf(e){
  const s=db.sections.find(x=>x.id===e.sec);
  const sub=s?s.subs.find(x=>x.id===e.sub):null;
  return (s?s.name:"?")+" → "+(sub?sub.name:"?");
}

/* ---------- streak ---------- */
function streak(){
  const days=new Set(db.entries.map(e=>dayKey(e.ts)));
  db.entries.forEach(e=>{if(e.doneTs)days.add(dayKey(e.doneTs));});
  let n=0; const d=new Date();
  if(!days.has(dayKey(d.getTime()))) d.setDate(d.getDate()-1);
  while(days.has(dayKey(d.getTime()))){n++; d.setDate(d.getDate()-1);}
  return n;
}

/* ---------- views ---------- */
let view="today", openSec=null, subFilter=null;
function go(v){
  view=v; subFilter=null;
  const m=document.getElementById("main");
  m.classList.remove("swap"); void m.offsetWidth; m.classList.add("swap");
  render();
}
function render(){
  ["today","sections","review"].forEach(v=>document.getElementById("nav-"+v).classList.toggle("on",v===view));
  const s=streak();
  document.getElementById("streakChip").textContent=s>0?s+"-day streak":"";
  const main=document.getElementById("main");
  const title=document.getElementById("pageTitle"), sub=document.getElementById("pageSub");
  if(view==="today"){
    title.textContent=new Date().toLocaleDateString([], {weekday:"long", month:"long", day:"numeric"});
    const open=db.entries.filter(e=>e.type==="task"&&!e.done);
    const logsToday=db.entries.filter(e=>(e.type==="log"&&dayKey(e.ts)===todayKey())||(e.type==="task"&&e.done&&e.doneTs&&dayKey(e.doneTs)===todayKey()));
    sub.textContent=open.length+" to do · "+logsToday.length+" logged today";
    main.innerHTML=renderToday(open,logsToday);
  }else if(view==="sections"){
    title.textContent="Sections"; sub.textContent="";
    main.innerHTML=subFilter?renderSubHistory():renderSections();
  }else{
    title.textContent="Review"; sub.textContent="";
    main.innerHTML=renderReview();
  }
}
function taskRow(e){
  return `<div class="card row">
    <button class="checkbox ${e.done?'done':''}" aria-label="Done" onclick="toggleDone('${e.id}',this)"></button>
    <div style="min-width:0;">
      <div style="font-size:14px;">${e.done?"<del>":""}${esc(e.text)}${e.done?"</del>":""}</div>
      <div class="sub-line">${esc(pathOf(e))}${e.repeat?" · repeats "+e.repeat:""}</div>
    </div>
    <span class="task-when ${e.due?'':'loose'}">${dueLabel(e)}</span>
    ${e.due?`<button class="icon-btn" aria-label="Add to calendar" onclick="icsFor('${e.id}')"><i class="ti ti-calendar-plus"></i></button>`:""}
    <button class="icon-btn" aria-label="Edit" onclick="openEdit('${e.id}')"><i class="ti ti-pencil" style="font-size:15px;"></i></button>
    <button class="icon-btn" aria-label="Delete" onclick="delEntry('${e.id}',this)"><i class="ti ti-x" style="font-size:14px;"></i></button>
  </div>`;
}
function logRow(e){
  return `<div class="tint-card" style="display:flex;align-items:flex-start;gap:8px;">
    <div style="flex:1;min-width:0;">
      <div style="font-size:14px;">${esc(e.text)}</div>
      <div class="sub-line">${esc(pathOf(e))} · ${fmtTime(e.doneTs||e.ts)}${e.amount!=null?" · $"+e.amount.toLocaleString():""}</div>
    </div>
    <button class="icon-btn" aria-label="Edit" onclick="openEdit('${e.id}')"><i class="ti ti-pencil" style="font-size:14px;"></i></button>
    <button class="icon-btn" aria-label="Delete" onclick="delEntry('${e.id}',this)"><i class="ti ti-x" style="font-size:13px;"></i></button>
  </div>`;
}
function renderToday(open,logs){
  const order=e=>e.due?e.due:Infinity;
  open.sort((a,b)=>order(a)-order(b));
  let h="";
  h+=`<p class="eyebrow">To do</p>`;
  h+=open.length?open.map(taskRow).join(""):`<p class="empty">Nothing pending. Speak a task below.</p>`;
  h+=`<p class="eyebrow">Logged today</p>`;
  h+=logs.length?logs.sort((a,b)=>(b.doneTs||b.ts)-(a.doneTs||a.ts)).map(logRow).join(""):`<p class="empty">Nothing logged yet today.</p>`;
  return h;
}
function monthTotal(secId,subId){
  const now=new Date();
  return db.entries.filter(e=>e.sec===secId&&e.sub===subId&&e.amount!=null&&new Date(e.ts).getMonth()===now.getMonth()&&new Date(e.ts).getFullYear()===now.getFullYear())
    .reduce((a,e)=>a+e.amount,0);
}
let manage=false;
function renderSections(){
  if(manage) return renderManage();
  let h="";
  for(const s of db.sections){
    const count=db.entries.filter(e=>e.sec===s.id).length;
    const isOpen=openSec===s.id;
    const secTotal=s.subs.reduce((a,x)=>a+monthTotal(s.id,x.id),0);
    h+=`<div class="sec-card">
      <button class="sec-head" onclick="openSec=openSec==='${s.id}'?null:'${s.id}';render()">
        <i class="ti ${s.icon}" style="font-size:18px;color:var(--sage);"></i>
        <span class="name">${esc(s.name)}</span>
        <span class="meta">${secTotal>0?"$"+Math.round(secTotal).toLocaleString()+" this month · ":""}${count} entr${count===1?"y":"ies"}</span>
        <i class="ti ti-chevron-${isOpen?"up":"down"}" style="font-size:14px;color:var(--sage-lt);"></i>
      </button>`;
    if(isOpen){
      for(const x of s.subs){
        const c=db.entries.filter(e=>e.sec===s.id&&e.sub===x.id).length;
        const t=monthTotal(s.id,x.id);
        h+=`<button class="sub-row" onclick="subFilter={sec:'${s.id}',sub:'${x.id}'};render()">
          ${esc(x.name)}<span class="meta">${t>0?"$"+Math.round(t).toLocaleString()+" · ":""}${c}</span></button>`;

      h+=`<button class="sub-row" style="color:var(--mut);" onclick="addSub('${s.id}')"><i class="ti ti-plus" style="font-size:13px;margin-right:6px;"></i>Add subsection</button>`;
    }
    h+=`</div>`;
  }
  h+=`<button class="ghost-row" onclick="addSection()"><i class="ti ti-plus"></i>Add section</button>
  <button class="ghost-row" onclick="manage=true;render()"><i class="ti ti-pencil"></i>Edit sections</button>`;

}
function renderManage(){
  let h=`<button class="ghost-row" onclick="manage=false;render()"><i class="ti ti-arrow-left"></i>Done editing</button>`;
  for(const s of db.sections){
    h+=`<div class="sec-card">
      <div class="sec-head">
        <i class="ti ${s.icon}" style="font-size:18px;color:var(--sage);"></i>
        <span class="name">${esc(s.name)}</span>
        <span style="margin-left:auto;display:flex;gap:2px;">
          <button class="icon-btn" aria-label="Rename" onclick="renameSection('${s.id}')"><i class="ti ti-pencil" style="font-size:15px;"></i></button>
          <button class="icon-btn" aria-label="Delete" onclick="delSection('${s.id}')"><i class="ti ti-trash" style="font-size:15px;color:var(--warn);"></i></button>
        </span>
      </div>`;
    for(const x of s.subs){
      h+=`<div class="sub-row">${esc(x.name)}
        <span style="margin-left:auto;display:flex;gap:2px;">
          <button class="icon-btn" aria-label="Rename" onclick="renameSub('${s.id}','${x.id}')"><i class="ti ti-pencil" style="font-size:14px;"></i></button>
          <button class="icon-btn" aria-label="Delete" onclick="delSub('${s.id}','${x.id}')"><i class="ti ti-trash" style="font-size:14px;color:var(--warn);"></i></button>
        </span></div>`;
    }
    h+=`<button class="sub-row" style="color:var(--mut);" onclick="addSub('${s.id}')"><i class="ti ti-plus" style="font-size:13px;margin-right:6px;"></i>Add subsection</button></div>`;
  }

function renameSection(id){
  const s=db.sections.find(x=>x.id===id);
  const n=prompt("Rename section:",s.name);
  if(n&&n.trim()){s.name=n.trim(); save(); render();}
}
function delSection(id){
  if(db.sections.length<=1){alert("You need at least one section."); return;}
  const s=db.sections.find(x=>x.id===id);
  const n=db.entries.filter(e=>e.sec===id).length;
  const other=db.sections.find(x=>x.id!==id);
  if(!confirm(`Delete "${s.name}"?`+(n?` Its ${n} entr${n===1?"y":"ies"} will move to ${other.name}.`:""))) return;
  db.sections=db.sections.filter(x=>x.id!==id);
  db.entries.forEach(e=>{if(e.sec===id){e.sec=other.id; e.sub=other.subs[0].id;}});
  save(); render();
}
function renameSub(sid,xid){
  const x=db.sections.find(s=>s.id===sid).subs.find(y=>y.id===xid);
  const n=prompt("Rename subsection:",x.name);
  if(n&&n.trim()){x.name=n.trim(); save(); render();}
}
function delSub(sid,xid){
  const s=db.sections.find(x=>x.id===sid);
  if(s.subs.length<=1){alert("A section needs at least one subsection."); return;}
  const x=s.subs.find(y=>y.id===xid);
  const n=db.entries.filter(e=>e.sec===sid&&e.sub===xid).length;
  const other=s.subs.find(y=>y.id!==xid);
  if(!confirm(`Delete "${x.name}"?`+(n?` Its ${n} entr${n===1?"y":"ies"} will move to ${other.name}.`:""))) return;
  s.subs=s.subs.filter(y=>y.id!==xid);
  db.entries.forEach(e=>{if(e.sec===sid&&e.sub===xid) e.sub=other.id;});
  save(); render();
}
function addSection(){
  const name=prompt("Name the new section:"); if(!name) return;
  db.sections.push({id:uid(),name:name.trim(),icon:"ti-folder",subs:[{id:uid(),name:"General",kw:[]}]});
  save(); render();
}
function addSub(secId){
  const name=prompt("Name the new subsection:"); if(!name) return;
  db.sections.find(s=>s.id===secId).subs.push({id:uid(),name:name.trim(),kw:[]});
  save(); render();
}
function renderSubHistory(){
  const s=db.sections.find(x=>x.id===subFilter.sec);
  const sub=s.subs.find(x=>x.id===subFilter.sub);
  const items=db.entries.filter(e=>e.sec===s.id&&e.sub===sub.id).sort((a,b)=>b.ts-a.ts);
  let h=`<button class="ghost-row" onclick="subFilter=null;render()"><i class="ti ti-arrow-left"></i>${esc(s.name)}</button>
    <h2 style="margin:4px 0 12px;">${esc(sub.name)}</h2>`;
  h+=items.length?items.map(e=>e.type==="task"&&!e.done?taskRow(e):
    `<div class="tint-card" style="display:flex;align-items:flex-start;gap:8px;">
     <div style="flex:1;min-width:0;"><div style="font-size:14px;">${e.done?"<del>":""}${esc(e.text)}${e.done?"</del>":""}</div>
     <div class="sub-line">${fmtDay(e.ts)}${e.amount!=null?" · $"+e.amount.toLocaleString():""}</div></div>
     <button class="icon-btn" aria-label="Edit" onclick="openEdit('${e.id}')"><i class="ti ti-pencil" style="font-size:14px;"></i></button>
    <button class="icon-btn" aria-label="Delete" onclick="delEntry('${e.id}',this)"><i class="ti ti-x" style="font-size:13px;"></i></button></div>`).join("")
    :`<p class="empty">Nothing here yet.</p>`;
  return h;
}
function renderReview(){
  const wk=[...Array(7)].map((_,i)=>{const d=new Date(); d.setDate(d.getDate()-(6-i)); return dayKey(d.getTime());});
  const counts=wk.map(k=>db.entries.filter(e=>dayKey(e.ts)===k).length);
  const max=Math.max(...counts,1);
  const weekStart=Date.now()-7*864e5;
  const done=db.entries.filter(e=>e.type==="task"&&e.done&&e.doneTs>weekStart).length;
  const openCount=db.entries.filter(e=>e.type==="task"&&!e.done).length;
  return `<div class="stats">
    <div class="stat"><span class="muted">Streak</span><div class="v">${streak()} day${streak()===1?"":"s"}</div></div>
    <div class="stat"><span class="muted">Tasks done, 7 days</span><div class="v">${done} done · ${openCount} open</div></div>
  </div>
  <p class="eyebrow">Entries per day</p>
  <div class="bars">${counts.map((c,i)=>`<div style="height:${Math.round(c/max*100)}%;" class="${i===6?'today':''}"></div>`).join("")}</div>
  <p class="muted">Last 7 days, today on the right</p>
  <div class="search"><i class="ti ti-search" style="color:var(--mut);"></i>
    <input id="searchInput" placeholder="Search everything…" oninput="renderSearch(this.value)"></div>
  <div id="searchResults"></div>`;
}
function renderSearch(q){
  const box=document.getElementById("searchResults");
  q=q.trim().toLowerCase();
  if(!q){box.innerHTML=""; return;}
  const hits=db.entries.filter(e=>e.text.toLowerCase().includes(q)).sort((a,b)=>b.ts-a.ts).slice(0,50);
  box.innerHTML=hits.length?hits.map(e=>`<div class="tint-card">
    <div style="font-size:14px;">${esc(e.text)}</div>
    <div class="sub-line">${esc(pathOf(e))} · ${fmtDay(e.ts)}${e.type==="task"?(e.done?" · done":" · open"):""}</div></div>`).join("")
    :`<p class="empty">No matches.</p>`;
}

/* ---------- theme ---------- */
const darkMQ=window.matchMedia?window.matchMedia("(prefers-color-scheme: dark)"):null;
function applyTheme(){
  const pref=db.settings.theme||"auto";
  const dark=pref==="dark"||(pref==="auto"&&darkMQ&&darkMQ.matches);
  document.documentElement.dataset.theme=dark?"dark":"light";
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta) meta.content=dark?"#1D201B":"#F0ECE0";
}
if(darkMQ) darkMQ.addEventListener("change",applyTheme);
function cycleTheme(){
  const order=["auto","light","dark"];
  const cur=db.settings.theme||"auto";
  db.settings.theme=order[(order.indexOf(cur)+1)%3];
  save(); applyTheme(); openSettings();
}
function themeLabel(){
  const t=db.settings.theme||"auto";
  return t==="auto"?"Auto (follows iPhone)":t==="dark"?"Night":"Light";
}

/* ---------- settings & security ---------- */
async function sha(s){
  const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("");
}
function openSettings(){
  const body=document.getElementById("sheetBody");
  body.innerHTML=`<h2 style="margin-bottom:8px;">Settings</h2>
    <button class="opt" onclick="cycleTheme()"><i class="ti ti-moon"></i>Appearance: ${themeLabel()}</button>
    <button class="opt" onclick="setPin()"><i class="ti ti-lock"></i>${db.settings.pinHash?"Change or remove passcode":"Set a passcode"}</button>
    <button class="opt" onclick="exportData()"><i class="ti ti-download"></i>Export backup</button>
    <button class="opt" onclick="document.getElementById('importFile').click()"><i class="ti ti-upload"></i>Import backup</button>
    <button class="opt" style="color:var(--warn);" onclick="eraseAll()"><i class="ti ti-trash" style="color:var(--warn);"></i>Erase everything</button>
    <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(this.files[0])">`;
  document.getElementById("sheetWrap").classList.remove("hidden");
}
function closeSheet(){document.getElementById("sheetWrap").classList.add("hidden");}
async function setPin(){
  if(db.settings.pinHash){
    const cur=prompt("Current passcode:"); if(cur===null) return;
    if(await sha(cur)!==db.settings.pinHash){alert("Wrong passcode."); return;}
  }
  const p=prompt("New 4-digit passcode (leave empty to remove):");
  if(p===null) return;
  if(p===""){db.settings.pinHash=null; save(); alert("Passcode removed."); closeSheet(); return;}
  if(!/^\d{4}$/.test(p)){alert("Use exactly 4 digits."); return;}
  db.settings.pinHash=await sha(p); save(); alert("Passcode set."); closeSheet();
}
function exportData(){
  const a=document.createElement("a");
  a.href="data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(db,null,1));
  a.download="daybook-backup-"+todayKey()+".json";
  document.body.appendChild(a); a.click(); a.remove();
}
function importData(f){
  if(!f) return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
    if(!d.entries||!d.sections) throw 0;
    db=d; save(); closeSheet(); render(); alert("Backup restored.");
  }catch(e){alert("That file doesn't look like a Daybook backup.");}};
  r.readAsText(f);
}
function eraseAll(){
  if(!confirm("Erase ALL entries and sections? This can't be undone."))return;
  if(!confirm("Really sure? Consider exporting a backup first."))return;
  db=structuredClone(DEFAULTS); save(); closeSheet(); render();
}

/* ---------- lock on open ---------- */
function initLock(){
  if(!db.settings.pinHash) return;
  const lock=document.getElementById("lock");
  lock.classList.remove("hidden");
  const inp=document.getElementById("lockInput");
  setTimeout(()=>inp.focus(),100);
  inp.addEventListener("input", async ()=>{
    if(inp.value.length===4){
      if(await sha(inp.value)===db.settings.pinHash){lock.classList.add("hidden"); inp.value="";}
      else{document.getElementById("lockErr").style.visibility="visible"; inp.value="";}
    }
  });
}

/* ---------- boot ---------- */
if(db.settings.theme===undefined) db.settings.theme="auto";
applyTheme();
initLock();
render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
